const START_INDEX = 0; // Sequence 9, true beginner start

function App() {
  const [loaded, setLoaded] = useState(false);
  const [seqIndex, setSeqIndex] = useState(START_INDEX);
  const [activeDay, setActiveDay] = useState(DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1].key);
  const [checks, setChecks] = useState({});
  const [showAscend, setShowAscend] = useState(false);
  const [installPromptEvent, setInstallPromptEvent] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(false);

  useEffect(() => {
    const data = loadProgress();
    if (data) {
      setSeqIndex(data.seqIndex ?? START_INDEX);
      setChecks(data.checks ?? {});
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (loaded) saveProgress({ seqIndex, checks });
  }, [seqIndex, checks, loaded]);

  // PWA install prompt capture (Android/Chrome)
  useEffect(() => {
    const handler = (e) => {
      e.preventDefault();
      setInstallPromptEvent(e);
      setShowInstallBanner(true);
    };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const day = DAYS.find(d => d.key === activeDay);
  const program = PROGRAMS[activeDay][seqIndex];
  const seq = SEQUENCES[seqIndex];

  const countable = (dayKey) => PROGRAMS[dayKey][seqIndex].ex.filter(e => e.sets > 0);
  const checkKey = (dayKey, exIndex) => `${seqIndex}-${dayKey}-${exIndex}`;

  const toggleCheck = (dayKey, exIndex) => {
    const key = checkKey(dayKey, exIndex);
    setChecks(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const digestionStats = (() => {
    let total = 0;
    let done = 0;
    DAYS.forEach(d => {
      const items = countable(d.key);
      total += items.length;
      items.forEach((_, i) => {
        if (checks[checkKey(d.key, i)]) done += 1;
      });
    });
    return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  })();

  const dayStats = (() => {
    const items = countable(activeDay);
    const done = items.filter((_, i) => checks[checkKey(activeDay, i)]).length;
    return { total: items.length, done, pct: items.length > 0 ? Math.round((done / items.length) * 100) : 0 };
  })();

  const canAscend = digestionStats.pct >= 100 && seqIndex < 9;

  const ascend = () => {
    if (seqIndex < 9) {
      setSeqIndex(seqIndex + 1);
      setShowAscend(true);
      setTimeout(() => setShowAscend(false), 3200);
    }
  };

  const descend = () => {
    if (seqIndex > 0) setSeqIndex(seqIndex - 1);
  };

  const handleInstallClick = async () => {
    if (!installPromptEvent) return;
    installPromptEvent.prompt();
    await installPromptEvent.userChoice;
    setInstallPromptEvent(null);
    setShowInstallBanner(false);
  };

  if (!loaded) {
    return h('div', { style: styles.loadingScreen },
      h('div', { style: styles.loadingText }, 'The fog gathers…')
    );
  }

  let exCounter = -1;

  return h('div', { style: styles.app },
    showInstallBanner && h('div', { style: styles.installBanner },
      h('span', { style: styles.installBannerText }, 'Install this as an app on your phone'),
      h('div', { style: styles.installBannerActions },
        h('button', { style: styles.installBtn, onClick: handleInstallClick }, 'Install'),
        h('button', { style: styles.installDismiss, onClick: () => setShowInstallBanner(false) }, '✕')
      )
    ),

    showAscend && h('div', { style: styles.ascendOverlay },
      h('div', { style: styles.ascendCard },
        h('div', { style: styles.ascendEyebrow }, 'THE POTION IS FULLY DIGESTED'),
        h('div', { style: styles.ascendTitle }, 'Sequence ' + SEQUENCES[seqIndex].num),
        h('div', { style: styles.ascendSub }, SEQUENCES[seqIndex].title)
      )
    ),

    h('header', { style: styles.header },
      h('div', { style: styles.headerTop },
        h('div', { style: styles.crest }, '†'),
        h('div', null,
          h('div', { style: styles.headerEyebrow }, 'PATHWAY OF THE BODY'),
          h('div', { style: styles.headerTitle }, "Beyonder's Regimen")
        )
      ),
      h('div', { style: styles.seqBanner },
        h('div', { style: styles.seqLeft },
          h('div', { style: styles.seqNumLabel }, 'SEQUENCE'),
          h('div', { style: styles.seqNum }, seq.num)
        ),
        h('div', { style: styles.seqRight },
          h('div', { style: styles.seqTitle }, seq.title),
          h('div', { style: styles.seqEpithet }, seq.epithet)
        )
      ),

      h('div', { style: styles.digestionBlock },
        h('div', { style: styles.digestionLabelRow },
          h('span', { style: styles.digestionLabel }, 'Potion Digestion'),
          h('span', { style: styles.digestionPct }, digestionStats.pct + '%')
        ),
        h('div', { style: styles.digestionBarTrack },
          h('div', { style: Object.assign({}, styles.digestionBarFill, { width: digestionStats.pct + '%' }) })
        ),
        h('div', { style: styles.digestionSub }, digestionStats.done + ' / ' + digestionStats.total + ' rites absorbed across the week')
      ),

      h('div', { style: styles.progressTrack },
        SEQUENCES.map((s) => h('div', {
          key: s.num,
          style: Object.assign({}, styles.progressDot,
            s.num > seq.num ? styles.progressDotFilled : {},
            s.num === seq.num ? styles.progressDotCurrent : {}
          ),
          title: 'Sequence ' + s.num + ': ' + s.title,
        }))
      ),
      h('div', { style: styles.seqControls },
        h('button', { style: styles.seqBtn, onClick: descend, disabled: seqIndex === 0 }, '◂ Regress'),
        h('span', { style: styles.seqControlLabel },
          canAscend ? 'Potion fully digested' : (digestionStats.pct + '% digested')
        ),
        h('button', {
          style: Object.assign({}, styles.seqBtn, canAscend ? styles.seqBtnActive : {}),
          onClick: ascend,
          disabled: !canAscend,
        }, 'Ascend ▸')
      )
    ),

    h('nav', { style: styles.dayNav },
      DAYS.map(d => {
        const items = countable(d.key);
        const done = items.filter((_, i) => checks[checkKey(d.key, i)]).length;
        const complete = items.length > 0 && done === items.length;
        return h('button', {
          key: d.key,
          onClick: () => setActiveDay(d.key),
          style: Object.assign({}, styles.dayTab,
            activeDay === d.key ? styles.dayTabActive : {},
            complete ? styles.dayTabComplete : {}
          ),
        },
          h('span', { style: styles.dayTabLabel }, d.label.slice(0, 3) + (complete ? ' ✓' : '')),
          h('span', { style: styles.dayTabFocus }, d.focus)
        );
      })
    ),

    h('main', { style: styles.main },
      h('div', { style: styles.ritualHeader },
        h('div', { style: styles.ritualName }, day.ritual),
        h('div', { style: styles.ritualMeta }, day.label + ' · ' + day.focus + ' Day')
      ),

      h('div', { style: styles.dayBarTrack },
        h('div', { style: Object.assign({}, styles.dayBarFill, { width: dayStats.pct + '%' }) })
      ),
      h('div', { style: styles.dayBarLabel }, dayStats.done + ' / ' + dayStats.total + ' exercises complete'),

      h('div', { style: styles.exerciseList },
        program.ex.map((e, i) => {
          if (e.sets === 0) {
            return h('div', { key: i, style: styles.warningNote }, e.name);
          }
          exCounter += 1;
          const key = checkKey(activeDay, exCounter);
          const isChecked = !!checks[key];
          const thisIndex = exCounter;
          return h('button', {
            key: i,
            onClick: () => toggleCheck(activeDay, thisIndex),
            style: Object.assign({}, styles.exerciseCard, isChecked ? styles.exerciseCardDone : {}),
          },
            h('div', { style: Object.assign({}, styles.checkbox, isChecked ? styles.checkboxChecked : {}) },
              isChecked ? '✓' : null
            ),
            h('div', { style: styles.exerciseBody },
              h('div', { style: Object.assign({}, styles.exerciseName, isChecked ? styles.exerciseNameDone : {}) }, e.name),
              h('div', { style: styles.exerciseSets }, e.sets + ' sets × ' + e.reps),
              e.note ? h('div', { style: styles.exerciseNote }, e.note) : null
            )
          );
        })
      ),

      h('div', { style: styles.goalsSection },
        h('div', { style: styles.goalsTitle }, "The Fool's Threshold — Final Goals"),
        h('div', { style: styles.goalsList },
          h('div', { style: styles.goalItem },
            h('span', { style: styles.goalName }, 'Dragon / Pistol Squats'),
            h('span', { style: styles.goalTarget }, '10 reps/side')
          ),
          h('div', { style: styles.goalItem },
            h('span', { style: styles.goalName }, 'One-Arm Push-ups'),
            h('span', { style: styles.goalTarget }, '5 reps/side')
          ),
          h('div', { style: styles.goalItem },
            h('span', { style: styles.goalName }, 'Pull-ups'),
            h('span', { style: styles.goalTarget }, '10 reps')
          )
        ),
        h('div', { style: styles.goalsNote },
          'No bar yet — Thursday builds toward pull-ups via rows until you find one (doorway bar, park, tree branch). True pull-ups need a hanging bar; the app will flag when to switch.'
        )
      ),

      h('div', { style: styles.footerNote }, 'Progress is saved automatically on this device.')
    )
  );
}
